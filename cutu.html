<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #ff4d6d;
            margin-top: 50px;
            font-size: 3rem;
            text-shadow: 2px 2px #ffb3c1;
            animation: bounce 2s infinite;
        }

        /* Photo Gallery Styling */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .photo {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            transition: transform 0.3s ease;
            border: 1px solid #ddd;
        }

        .photo:nth-child(even) { transform: rotate(3deg); }

        .photo:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
        }

        .photo img {
            width: 200px;
            height: 250px;
            object-fit: cover;
        }

        /* Message Section */
        #message {
            display: none;
            text-align: center;
            color: #590d22;
            padding: 20px;
            max-width: 600px;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Swetiie ! ❤️</h1>

    <div class="gallery">
        <div class="photo"><img src="princess.jpeg" alt="Memory 1"></div>
        <div class="photo"><img src="cutiepie.jpeg" alt="Memory 2"></div>
        <div class="photo"><img src="motki.jpeg" alt="Memory 3"></div>
    </div>

    <button onclick="revealMessage()">Click for a Surprise</button>

    <div id="message">
        <h2>To my favorite person... </h2>
        <p>Your personal heartfelt message goes here. You make every day brighter!</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function revealMessage() {
            // Trigger Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ff758f', '#ffb3c1']
            });

            // Show Message
            document.getElementById('message').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
